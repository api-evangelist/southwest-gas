aid: southwest-gas
name: Southwest Gas
description: >-
  Southwest Gas Holdings is a natural gas distribution company that purchases, distributes,
  and transports natural gas for customers in Arizona, Nevada, and California. As a Fortune
  1000 utility company headquartered in Las Vegas, Nevada, Southwest Gas serves over
  2 million customers through its regulated utility segment and also operates Centuri Group,
  a full-service utility infrastructure services company.
