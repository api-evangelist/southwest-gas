  - aid: southwest-gas:southwest-gas-agency-portal-api
    name: Southwest Gas Agency Portal API
    description: >-
      The Southwest Gas Agency Portal provides access for charitable organizations
      and assistance agencies to look up customer accounts and submit utility assistance
      pledges on behalf of customers in need.
