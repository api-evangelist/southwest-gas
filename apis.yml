apis:
  - aid: southwest-gas:southwest-gas-my-account-api
    name: Southwest Gas My Account API
    description: >-
      The Southwest Gas My Account API powers the online customer portal and mobile
      application for natural gas utility customers in Arizona, Nevada, and California.
      Customers can view usage history, pay bills, manage account settings, and receive
      outage notifications through the portal.
    humanURL: https://myaccount.swgas.com/
    baseURL: https://myaccount.swgas.com
    tags:
      - Natural Gas
      - Customer Account
      - Utility
      - Billing
