principles:
  - name: Visibility
    description: No public usage API. Visibility is provided through the deliverables
      agreed with the utility (statements, EDI exchanges, regulatory filings).
  - name: Allocation
    description: Costs related to Southwest Gas integrations are allocated against
      the contracting business unit (energy procurement, builder programs).
  - name: Optimization
    description: Optimization is contractual / regulatory rather than technical;
      tariffs, transportation contracts, and Green Button consent govern cost.
  - name: Accountability
    description: Owned by the contracting energy or facilities manager. The utility
      does not provide self-serve cost-management tooling.
notes: No public per-call billing or FinOps surface; entry exists for catalog
  completeness only.
