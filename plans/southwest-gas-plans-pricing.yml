        name: utility_engagement
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Customer-Authorized Data Access (Green Button)
      - name: Contracted Marketer / Transportation EDI
      - name: Builder / Developer Portal
