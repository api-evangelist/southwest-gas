description: Southwest Gas Holdings is a regulated natural gas utility serving
  Arizona, Nevada, and California. It does not operate a public developer API
  program. Any data interfaces (e.g. Green Button customer data, EDI for marketers,
  builder/contractor portals) are utility-regulated or contractual and not priced
  on a per-call basis.
sources:
  - https://www.swgas.com/
notes: No public developer pricing or plans page exists. Data access is
  utility-regulated (customer authorization) or contracted with marketers and
  developers. Listed for catalog completeness.
plans:
  - id: southwest-gas-contact-sales
    name: Contact Sales
    type: enterprise
    description: Programmatic data access for transportation customers, marketers,
      large-builder developer portals, and Green Button customer data is established
      via direct engagement with Southwest Gas; there is no published price list.
